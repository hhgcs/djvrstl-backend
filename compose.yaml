services:
  djvrstl-backend:
    image: djvrstl-backend
    build:
      context: .
      dockerfile: djvrstl-backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=djvrstl;Username=djvrstl;Password=djvrstl_dev_password
      Cors__AllowedOrigins__0: http://localhost:3000
      SeedData__Enabled: "true"
    ports:
      - "8080:8080"
    volumes:
      - djvrstl-product-uploads:/app/wwwroot/uploads/products

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: djvrstl
      POSTGRES_USER: djvrstl
      POSTGRES_PASSWORD: djvrstl_dev_password
    ports:
      - "5432:5432"
    volumes:
      - djvrstl-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U djvrstl -d djvrstl"]
      interval: 5s
      timeout: 5s
      retries: 10

  ghost:
    image: ghost:5-alpine
    depends_on:
      ghost-mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      url: ${GHOST_URL:-http://localhost:2368}
      database__client: mysql
      database__connection__host: ghost-mysql
      database__connection__port: 3306
      database__connection__user: ${GHOST_MYSQL_USER:-ghost}
      database__connection__password: ${GHOST_MYSQL_PASSWORD:-ghost_dev_password}
      database__connection__database: ${GHOST_MYSQL_DATABASE:-ghost}
    ports:
      - "2368:2368"
    volumes:
      - djvrstl-ghost-content:/var/lib/ghost/content

  ghost-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${GHOST_MYSQL_ROOT_PASSWORD:-ghost_root_dev_password}
      MYSQL_DATABASE: ${GHOST_MYSQL_DATABASE:-ghost}
      MYSQL_USER: ${GHOST_MYSQL_USER:-ghost}
      MYSQL_PASSWORD: ${GHOST_MYSQL_PASSWORD:-ghost_dev_password}
    volumes:
      - djvrstl-ghost-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${GHOST_MYSQL_ROOT_PASSWORD:-ghost_root_dev_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  djvrstl-postgres-data:
  djvrstl-product-uploads:
  djvrstl-ghost-content:
  djvrstl-ghost-mysql-data:
